name: Crypto Pipeline CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout codebase using modern v4 action
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Astro CLI for Airflow compilation checks
      - name: Install Astro CLI
        run: curl -sSL https://install.astronomer.io | sudo bash -s

      # 2.5 Initialize Astro project config (since .astro/ is gitignored)
      - name: Initialize Astro project config
        run: |
          mkdir -p .astro
          echo "project:" > .astro/config.yaml
          echo "    name: crypto-pipeline" >> .astro/config.yaml

      # 3. Parse and Validate Airflow DAGs
      # Sourced via .env.example to mock environment parameters in CI runner
      - name: Lint DAGs (Parse Verification)
        run: astro dev parse --env .env.example

      # 4. Set up python modern runner environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 5. Install libraries needed for tests
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-mock

      # 6. Execute pytest on host with required mock variables & PYTHONPATH pathing
      - name: Run tests
        env:
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          COINCAP_API_KEY: test_key
          PYTHONPATH: include/scripts
        run: pytest tests/ -v --tb=short

      # 7. Verify both Dockerfiles compile successfully
      - name: Build Airflow Docker Image
        run: docker build -t crypto-pipeline:ci .

      - name: Build Metabase Docker Image
        run: docker build -t custom-metabase:ci -f Dockerfile.metabase .
